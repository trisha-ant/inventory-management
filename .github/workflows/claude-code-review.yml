name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    # Skip draft PRs — review only when marked ready
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this pull request for the Factory Inventory Management System (Vue 3 + FastAPI).

            Focus areas:

            **Vue 3 frontend (client/)**
            - Composition API patterns — refs vs computed, no prop mutation
            - v-for keys must be unique IDs (sku, month), never array index
            - Date validation before .getMonth() calls
            - Loading/error states handled

            **FastAPI backend (server/)**
            - Pydantic models match JSON data structure
            - Filters check for 'all' value, apply case-insensitive
            - Don't mutate global data — filter on copies
            - HTTPException for 404s, proper status codes

            **General**
            - Security: no XSS, injection, or OWASP top 10 issues
            - Dead code, unnecessary complexity
            - Test coverage for new endpoints (tests/backend/)

            Use inline comments for specific issues. Post a top-level summary when done.
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
